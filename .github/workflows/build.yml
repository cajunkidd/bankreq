name: Build Windows .exe

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build single-file .exe
        shell: cmd
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "BankDataViewer"
          --icon "Stinelogo.ico"
          --add-data "raw data (2).xlsx;."
          --add-data "Stinelogo.png;."
          --collect-submodules openpyxl
          app.py

      - name: Upload .exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankDataViewer-windows
          path: dist/BankDataViewer.exe
          if-no-files-found: error

      - name: Attach .exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BankDataViewer.exe
          generate_release_notes: true
