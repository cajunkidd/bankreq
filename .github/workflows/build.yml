name: Build Windows .exe

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Locate Streamlit static directory
        shell: pwsh
        run: |
          $stDir = python -c "import streamlit, os; print(os.path.join(os.path.dirname(streamlit.__file__), 'static'))"
          Write-Host "Streamlit static dir: $stDir"
          if (-not (Test-Path $stDir)) {
            Write-Error "Streamlit static directory not found at $stDir"
            exit 1
          }
          $childCount = (Get-ChildItem $stDir -Recurse -File | Measure-Object).Count
          Write-Host "Streamlit static dir contains $childCount files."
          "STREAMLIT_STATIC=$stDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build single-file .exe
        shell: cmd
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --name "BankDataViewer"
          --icon "Stinelogo.ico"
          --add-data "app.py;."
          --add-data "Stinelogo_white_rec.svg;."
          --add-data "%STREAMLIT_STATIC%;streamlit/static"
          --collect-all streamlit
          --collect-all numpy
          --collect-all pandas
          --collect-all openpyxl
          --collect-all altair
          --collect-all pyarrow
          --copy-metadata streamlit
          --copy-metadata altair
          launcher.py

      - name: Verify Streamlit static files made it into the bundle
        shell: pwsh
        run: |
          # PyInstaller --onefile compresses everything into the .exe, so
          # we can't grep build/ for plain files. Instead, parse the TOC
          # files (Python literals listing every (src, dest, type) bundled).
          $tocs = Get-ChildItem -Path "build\BankDataViewer" -Filter "*.toc" `
                  -ErrorAction SilentlyContinue
          if (-not $tocs) {
            Write-Error "No .toc files found in build\BankDataViewer."
            exit 1
          }
          $hit = $false
          foreach ($t in $tocs) {
            $text = Get-Content -Raw $t.FullName
            if ($text -match "streamlit[\\/]+static[\\/]+index\.html") {
              Write-Host "OK: streamlit/static/index.html listed in $($t.Name)"
              $hit = $true
              break
            }
          }
          if (-not $hit) {
            Write-Error "streamlit/static/index.html NOT in any TOC."
            foreach ($t in $tocs) {
              Write-Host "--- $($t.Name) (first matches for 'streamlit') ---"
              Select-String -Path $t.FullName -Pattern "streamlit" -SimpleMatch |
                Select-Object -First 5 | ForEach-Object { Write-Host $_.Line }
            }
            exit 1
          }

      - name: Upload .exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankDataViewer-windows
          path: dist/BankDataViewer.exe
          if-no-files-found: error

      - name: Publish or update Latest release (push to main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Auto-published from the most recent push to main. Always contains the newest BankDataViewer.exe.
          files: dist/BankDataViewer.exe
          make_latest: "true"

      - name: Attach .exe to versioned Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BankDataViewer.exe
          generate_release_notes: true
