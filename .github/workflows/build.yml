name: Build Windows .exe

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.10.0

      - name: Build single-file .exe
        shell: cmd
        run: >
          pyinstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "BankDataViewer"
          --icon "Stinelogo.ico"
          --add-data "app.py;."
          --add-data "raw data (2).xlsx;."
          --add-data "Stinelogo_white_rec.svg;."
          --collect-all streamlit
          --collect-all numpy
          --collect-all pandas
          --collect-all openpyxl
          --collect-all altair
          --collect-all pyarrow
          --copy-metadata streamlit
          --copy-metadata altair
          launcher.py

      - name: Upload .exe as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: BankDataViewer-windows
          path: dist/BankDataViewer.exe
          if-no-files-found: error

      - name: Publish or update Latest release (push to main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: Auto-published from the most recent push to main. Always contains the newest BankDataViewer.exe.
          files: dist/BankDataViewer.exe
          make_latest: "true"

      - name: Attach .exe to versioned Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/BankDataViewer.exe
          generate_release_notes: true
